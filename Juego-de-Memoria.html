body {

@keyframes floatUpAndFade {
0% {
transform: translate(-50%, 0) scale(1);
opacity: 1;
}
100% {
transform: translate(-50%, -200px) scale(0.5);
opacity: 0;
}
}
.floating-avatar {
position: fixed;
left: 50%;
bottom: 40%;
width: 120px;
height: 120px;
z-index: 30;
pointer-events: none;
animation: floatUpAndFade 1.5s ease-out forwards;
}
@keyframes floating {
0% { transform: translateY(0px) rotate(0deg); }
50% { transform: translateY(-10px) rotate(0deg); }
100% { transform: translateY(0px) rotate(0deg); }
}
@keyframes spinRight {
0% { transform: translateY(0px) rotate(0deg); }
100% { transform: translateY(0px) rotate(360deg) translateX(20px); }

.logo-animation {
animation: floating 2s ease-in-out infinite;
}
.logo-spin {
animation: spinRight 0.5s ease-out forwards;
}
.card {
perspective: 1000px;
transform-style: preserve-3d;
transition: transform 0.5s;
}
.card-inner {
position: relative;
width: 100%;
height: 100%;
transform-style: preserve-3d;
transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.card.flipped .card-inner {
transform: rotateY(180deg);
}
.card-front, .card-back {
position: absolute;
width: 100%;
height: 100%;
backface-visibility: hidden;
border-radius: 8px;
transform-style: preserve-3d;
}
.card-back {
transform: rotateY(180deg);
}
.transition-transform {
transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes pulse {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.05); }
}
.pulse-animation {
animation: pulse 0.5s;
}
@keyframes shake {
0%, 100% { transform: translateX(0); }
20%, 60% { transform: translateX(-5px); }
40%, 80% { transform: translateX(5px); }
}
.shake-animation {
animation: shake 0.5s;
}
@keyframes celebrate {
0% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.2); opacity: 0.8; }
100% { transform: scale(1); opacity: 1; }
}
.celebrate-animation {
animation: celebrate 0.8s;
}

name: 'tve',
url: 'https://static.readdy.ai/image/cd41dc559ace1de21325f4658cfb045a/1dcc05a135274e26c300243ba25ab847.jpeg'
},
{
name: 'custo',
url: 'https://static.readdy.ai/image/cd41dc559ace1de21325f4658cfb045a/5a6a5caf7bfb64f7aa3c7d11abc633fe.png'
},
{
name: 'jb',
url: 'https://static.readdy.ai/image/cd41dc559ace1de21325f4658cfb045a/cbd81ba02c6bf0af72dfe630c842731e.png'
},
{
name: 'options',
url: 'https://static.readdy.ai/image/cd41dc559ace1de21325f4658cfb045a/6041889eb8e8ee6985e458bc8b6cbae9.png'
}
]
};
let cardImages = cardCategories.performances;
// DOM elements
const gameBoard = document.getElementById('game-board');
const movesElement = document.getElementById('moves');
const scoreElement = document.getElementById('score');
const timerElement = document.getElementById('timer');
const restartBtn = document.getElementById('restart-btn');
const pauseBtn = document.getElementById('pause-btn');
const settingsBtn = document.getElementById('settings-btn');
const victoryModal = document.getElementById('victory-modal');
const finalTimeElement = document.getElementById('final-time');
const finalMovesElement = document.getElementById('final-moves');
const playAgainBtn = document.getElementById('play-again-btn');
const homeBtn = document.getElementById('home-btn');
const pauseModal = document.getElementById('pause-modal');
const resumeBtn = document.getElementById('resume-btn');
const restartGameBtn = document.getElementById('restart-game-btn');
const exitBtn = document.getElementById('exit-btn');
// Game configuration
const gameConfig = {
players: 1,
level: 1,
category: 'performances'
};
// Initialize the game
function initGame() {
state.cards = [];
state.flippedCards = [];
state.matchedPairs = 0;
state.moves = 0;
state.score = 0;
state.gameStarted = false;
state.gamePaused = false;
state.startTime = null;
state.elapsedTime = 0;
if (state.timerInterval) {
clearInterval(state.timerInterval);
state.timerInterval = null;
}
// Show main menu
document.getElementById('main-menu').classList.remove('hidden');
document.getElementById('game-container').classList.add('hidden');
updateUI();
}
// Start the game with current configuration
function startGame() {
// Hide main menu and show game
document.getElementById('main-menu').classList.add('hidden');
document.getElementById('game-container').classList.remove('hidden');
// Update card images based on selected category
cardImages = cardCategories[gameConfig.category];
// Update total pairs based on difficulty level
updateTotalPairs();
// Create and render cards
createCards();
renderCards();
// Update player count display
document.getElementById('player-count').textContent = gameConfig.players;
// Reset player states
state.currentPlayer = 1;
state.playerScores = [0, 0, 0];
state.lastMatchedPlayer = null;
// Update game container background based on current player
updatePlayerTurnIndicator();
// Set up periodic card shuffling for hard difficulty
if (gameConfig.level === 3) {
let shuffleInterval = setInterval(() => {
if (!state.gamePaused && state.gameStarted && state.matchedPairs < state.totalPairs) {
const unmatchedCards = state.cards.filter(card => !card.isMatched);
if (unmatchedCards.length > 2) {
// Shuffle only unmatched and unflipped cards
const cardsToShuffle = unmatchedCards.filter(card => !card.isFlipped);
if (cardsToShuffle.length > 2) {
const shuffledPositions = shuffleArray([...cardsToShuffle]);
cardsToShuffle.forEach((card, index) => {
const originalIndex = state.cards.findIndex(c => c.id === card.id);
state.cards[originalIndex] = shuffledPositions[index];
});
renderCards();
}
}
}
}, 10000); // Shuffle every 10 seconds
// Clear interval when game ends
document.addEventListener('gameEnd', () => clearInterval(shuffleInterval));
}
}
function updatePlayerTurnIndicator() {
const gameContainer = document.getElementById('game-container');
if (gameConfig.players > 1) {
let bgColor = '#FFF7ED';
let textColor = '#F97316';
if (state.currentPlayer === 2) {
bgColor = '#F0FDF4';
textColor = '#22C55E';
} else if (state.currentPlayer === 3) {
bgColor = '#FEF9C3';
textColor = '#CA8A04';
}
gameContainer.style.backgroundColor = bgColor;
document.querySelector('.player-indicator')?.remove();
const indicator = document.createElement('div');
indicator.className = 'player-indicator text-center py-2 mb-4 text-lg font-medium';
indicator.style.color = textColor;
const playerColors = {
1: 'Naranja',
2: 'Verde',
3: 'Amarillo'
};
indicator.textContent = `Turno del ${playerColors[state.currentPlayer]}`;
gameContainer.insertBefore(indicator, gameContainer.firstChild);
} else {
gameContainer.style.backgroundColor = '';
document.querySelector('.player-indicator')?.remove();
}
}
// Create cards array with pairs
function createCards() {
const cardPairs = [];
// Determine how many pairs to use based on difficulty level
let pairsToUse = gameConfig.level === 3 ? 16 : 8;
// Create pairs of cards
cardImages.slice(0, pairsToUse).forEach((image, index) => {
// Create two cards with the same image
const card1 = {
id: index * 2,
imageUrl: image.url,
name: image.name,
isFlipped: false,
isMatched: false
};
const card2 = {
id: index * 2 + 1,
imageUrl: image.url,
name: image.name,
isFlipped: false,
isMatched: false
};
cardPairs.push(card1, card2);
});
// Shuffle the cards
state.cards = shuffleArray(cardPairs);
}
// Shuffle array using Fisher-Yates algorithm
function shuffleArray(array) {
const newArray = [...array];
for (let i = newArray.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[newArray[i], newArray[j]] = [newArray[j], newArray[i]];
}
return newArray;
}
// Render cards to the game board
function renderCards() {
gameBoard.innerHTML = '';
// Adjust grid columns based on difficulty level
gameBoard.className = `w-full grid ${gameConfig.level === 3 ? 'grid-cols-4' : 'grid-cols-4'} gap-2 mb-4`;
state.cards.forEach(card => {
const cardElement = document.createElement('div');
cardElement.className = `card ${card.isFlipped ? 'flipped' : ''} ${card.isMatched ? 'matched' : ''} aspect-square cursor-pointer`;
cardElement.dataset.id = card.id;
cardElement.innerHTML = `
<div class="card-inner w-full h-full">
<div class="card-front flex items-center justify-center bg-white border-2 border-gray-200 shadow-sm">
<div class="w-8 h-8 flex items-center justify-center text-primary">
<i class="ri-gamepad-line ri-lg"></i>
</div>
</div>
<div class="card-back flex items-center justify-center bg-white border-2 border-primary shadow-sm">
<img src="${card.imageUrl}" alt="${card.name}" class="w-full h-full object-contain p-2">
</div>
</div>
`;
cardElement.addEventListener('click', () => handleCardClick(card.id));
gameBoard.appendChild(cardElement);
});
}
// Handle card click
function handleCardClick(cardId) {
// Ignore clicks if game is paused
if (state.gamePaused) return;
// Start the timer on first click
if (!state.gameStarted) {
startTimer();
state.gameStarted = true;
}
const card = state.cards.find(c => c.id === cardId);
const cardElement = document.querySelector(`.card[data-id="${cardId}"]`);
// Ignore if card is already flipped or matched
if (card.isFlipped || card.isMatched || state.flippedCards.length >= 2) {
return;
}
// Flip the card
card.isFlipped = true;
cardElement.classList.add('flipped');
state.flippedCards.push(card);
// Check for match if two cards are flipped
if (state.flippedCards.length === 2) {
state.moves++;
updateUI();
const [card1, card2] = state.flippedCards;
if (card1.name === card2.name) {
// Match found
handleMatch(card1, card2);
} else {
// No match
handleMismatch(card1, card2);
}
}
}
// Handle matched cards
function handleMatch(card1, card2) {
card1.isMatched = true;
card2.isMatched = true;
const card1Element = document.querySelector(`.card[data-id="${card1.id}"]`);
const card2Element = document.querySelector(`.card[data-id="${card2.id}"]`);
const avatar = document.createElement('img');
avatar.src = 'https://static.readdy.ai/image/cd41dc559ace1de21325f4658cfb045a/06a52424a666abec930312148b806807.png';
avatar.className = 'floating-avatar';
document.body.appendChild(avatar);
setTimeout(() => avatar.remove(), 1500);
// Add match animation
card1Element.classList.add('pulse-animation');
card2Element.classList.add('pulse-animation');
setTimeout(() => {
card1Element.classList.remove('pulse-animation');
card2Element.classList.remove('pulse-animation');
// Add matched style
card1Element.classList.add('matched');
card2Element.classList.add('matched');
state.matchedPairs++;
if (gameConfig.players > 1) {
state.playerScores[state.currentPlayer - 1] += 10;
state.lastMatchedPlayer = state.currentPlayer;
} else {
state.score += 10;
}
state.flippedCards = [];
updateUI();
// Check if game is complete
if (state.matchedPairs === state.totalPairs) {
endGame();
} else if (gameConfig.players > 1) {
// If current player didn't get a match, switch to the next player
if (state.lastMatchedPlayer !== state.currentPlayer) {
state.currentPlayer = state.currentPlayer === gameConfig.players ? 1 : state.currentPlayer + 1;
updatePlayerTurnIndicator();
}
}
}, 500);
}
// Handle mismatched cards
function handleMismatch(card1, card2) {
const card1Element = document.querySelector(`.card[data-id="${card1.id}"]`);
const card2Element = document.querySelector(`.card[data-id="${card2.id}"]`);
// Add mismatch animation
card1Element.classList.add('shake-animation');
card2Element.classList.add('shake-animation');
// Set flip back delay based on difficulty level
let flipBackDelay = 1000;
if (gameConfig.level === 2) {
flipBackDelay = 700;
} else if (gameConfig.level === 3) {
flipBackDelay = 500;
}
setTimeout(() => {
card1Element.classList.remove('shake-animation');
card2Element.classList.remove('shake-animation');
// Flip cards back
card1.isFlipped = false;
card2.isFlipped = false;
// Add transition class for smooth flip back
card1Element.classList.add('transition-transform');
card2Element.classList.add('transition-transform');
card1Element.classList.remove('flipped');
card2Element.classList.remove('flipped');
// Remove transition class after animation completes
setTimeout(() => {
card1Element.classList.remove('transition-transform');
card2Element.classList.remove('transition-transform');
}, 500);
state.flippedCards = [];
if (gameConfig.players > 1) {
// Switch to next player after a mismatch in multiplayer mode
state.currentPlayer = state.currentPlayer === gameConfig.players ? 1 : state.currentPlayer + 1;
updatePlayerTurnIndicator();
} else {
// Deduct points for wrong match in single player mode
state.score = Math.max(0, state.score - 1);
}
updateUI();
}, flipBackDelay);
}
// Start the timer
function startTimer() {
state.startTime = Date.now() - state.elapsedTime;
state.timerInterval = setInterval(updateTimer, 1000);
}
// Pause the timer
function pauseTimer() {
if (state.timerInterval) {
clearInterval(state.timerInterval);
state.timerInterval = null;
state.elapsedTime = Date.now() - state.startTime;
}
}
// Resume the timer
function resumeTimer() {
if (!state.timerInterval) {
state.startTime = Date.now() - state.elapsedTime;
state.timerInterval = setInterval(updateTimer, 1000);
}
}
// Update the timer display
function updateTimer() {
const elapsedTime = Date.now() - state.startTime;
const seconds = Math.floor((elapsedTime / 1000) % 60);
const minutes = Math.floor((elapsedTime / (1000 * 60)) % 60);
timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
}
// Update UI elements
function updateUI() {
movesElement.textContent = state.moves;
if (gameConfig.players > 1) {
let scoreText = state.playerScores.join(' - ');
scoreElement.textContent = scoreText;
} else {
scoreElement.textContent = state.score;
}
}
// End the game
function endGame() {
pauseTimer();
// Dispatch game end event
const gameEndEvent = new Event('gameEnd');
document.dispatchEvent(gameEndEvent);
// Add celebration animation to all matched cards
document.querySelectorAll('.card.matched').forEach(card => {
card.classList.add('celebrate-animation');
});
// Show victory modal
setTimeout(() => {
if (gameConfig.players > 1) {
const maxScore = Math.max(...state.playerScores);
const winners = state.playerScores
.map((score, index) => score === maxScore ? index + 1 : null)
.filter(winner => winner !== null);
const isMultipleWinners = winners.length > 1;
const playerColors = {
1: 'Naranja',
2: 'Verde',
3: 'Amarillo'
};
const scoresText = state.playerScores
.map((score, index) => `${playerColors[index + 1]}: ${score}`)
.join(' - ');
finalTimeElement.textContent = scoresText;
finalMovesElement.textContent = isMultipleWinners ?
'Empate' :
`Ganador: ${playerColors[winners[0]]}`;
} else {
finalTimeElement.textContent = timerElement.textContent;
finalMovesElement.textContent = state.moves;
}
victoryModal.classList.remove('hidden');
}, 1000);
}
// Menu Event Listeners
document.querySelectorAll('.player-btn').forEach(btn => {
btn.addEventListener('click', (e) => {
const logo = document.querySelector('.logo-animation');
logo.classList.remove('logo-animation');
logo.classList.add('logo-spin');
setTimeout(() => {
logo.classList.remove('logo-spin');
logo.classList.add('logo-animation');
}, 500);
document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('bg-primary', 'text-white'));
document.querySelectorAll('.player-btn').forEach(b => b.classList.add('bg-white', 'border-gray-300', 'text-gray-700'));
e.target.classList.remove('bg-white', 'border-gray-300', 'text-gray-700');
e.target.classList.add('bg-primary', 'text-white');
gameConfig.players = parseInt(e.target.dataset.players);
});
});
document.querySelectorAll('.level-btn').forEach(btn => {
btn.addEventListener('click', (e) => {
const logo = document.querySelector('.logo-animation');
logo.classList.remove('logo-animation');
logo.classList.add('logo-spin');
setTimeout(() => {
logo.classList.remove('logo-spin');
logo.classList.add('logo-animation');
}, 500);
document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('bg-primary', 'text-white'));
document.querySelectorAll('.level-btn').forEach(b => b.classList.add('bg-white', 'border-gray-300', 'text-gray-700'));
e.target.classList.remove('bg-white', 'border-gray-300', 'text-gray-700');
e.target.classList.add('bg-primary', 'text-white');
gameConfig.level = parseInt(e.target.dataset.level);
});
});
document.querySelectorAll('.category-btn').forEach(btn => {
btn.addEventListener('click', (e) => {
const logo = document.querySelector('.logo-animation');
logo.classList.remove('logo-animation');
logo.classList.add('logo-spin');
setTimeout(() => {
logo.classList.remove('logo-spin');
logo.classList.add('logo-animation');
}, 500);
document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('bg-primary', 'text-white'));
document.querySelectorAll('.category-btn').forEach(b => b.classList.add('bg-white', 'border-gray-300', 'text-gray-700'));
e.target.classList.remove('bg-white', 'border-gray-300', 'text-gray-700');
e.target.classList.add('bg-primary', 'text-white');
gameConfig.category = e.target.dataset.category;
});
});
document.getElementById('start-game').addEventListener('click', startGame);
// Game Event Listeners
restartBtn.addEventListener('click', initGame);
pauseBtn.addEventListener('click', () => {
if (state.gameStarted && !state.gamePaused) {
state.gamePaused = true;
pauseTimer();
pauseModal.classList.remove('hidden');
}
});
resumeBtn.addEventListener('click', () => {
state.gamePaused = false;
resumeTimer();
pauseModal.classList.add('hidden');
});
restartGameBtn.addEventListener('click', () => {
pauseModal.classList.add('hidden');
initGame();
});
exitBtn.addEventListener('click', () => {
pauseModal.classList.add('hidden');
// In a real app, this would navigate to home screen
// For now, just restart the game
initGame();
});
playAgainBtn.addEventListener('click', () => {
victoryModal.classList.add('hidden');
initGame();
});
homeBtn.addEventListener('click', () => {
victoryModal.classList.add('hidden');
// In a real app, this would navigate to home screen
// For now, just restart the game
initGame();
});
settingsBtn.addEventListener('click', (e) => {
if (!state.gamePaused) {
state.gamePaused = true;
pauseTimer();
}
});
// Initialize the game
initGame();
});
</script>
