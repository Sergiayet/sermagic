:where([class^="ri-"])::before { content: "\f3c2"; }
body {
font-family: 'Poppins', sans-serif;

@keyframes float {
0% {
transform: translateY(0px);
}
50% {
transform: translateY(-10px);
}
100% {
transform: translateY(0px);
}
}
.floating-logo {
animation: float 3s ease-in-out infinite;
}
.option-card {
transition: all 0.3s ease;
}
.option-card:hover {
transform: translateY(-5px);
box-shadow: 0 10px 25px rgba(255, 127, 80, 0.2);
}
.option-card:active {
transform: translateY(0);
}
</style>

<div class="text-center mb-12">

</div>
<p class="text-gray-600 text-lg">Selecciona cómo deseas visualizar</p>
</div>
<div class="w-full max-w-3xl flex flex-col md:flex-row gap-6 justify-center items-center">

<div class="w-24 h-24 flex items-center justify-center mb-6 bg-primary/10 rounded-full">
<i class="ri-computer-line ri-3x text-primary"></i>
</div>

<p class="text-gray-600 text-center">Visualiza en pantalla completa con todas las funcionalidades</p>

<button class="mt-6 bg-primary hover:bg-primary/90 text-white py-3 px-8 rounded-button font-medium transition-all">

<!-- Opción Móvil -->

<div class="w-24 h-24 flex items-center justify-center mb-6 bg-primary/10 rounded-full">
<i class="ri-smartphone-line ri-3x text-primary"></i>
</div>

<p class="text-gray-600 text-center">Experiencia optimizada para dispositivos móviles</p>

<script id="interaction-script">
document.addEventListener('DOMContentLoaded', function() {
const optionCards = document.querySelectorAll('.option-card');
optionCards.forEach(card => {
card.addEventListener('click', function() {
const button = this.querySelector('button');
const link = this.querySelector('a');
if(link) {
const option = this.querySelector('h2').textContent;
button.classList.add('bg-secondary');
setTimeout(() => {
button.classList.remove('bg-secondary');
window.location.href = link.href;
}, 200);
}
});
});
});
</script>
